<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Anime Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  overflow: hidden;
}

/* animated background */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #ff00cc, transparent);
  animation: move 6s infinite alternate;
  filter: blur(100px);
}

@keyframes move {
  from { transform: translate(-120px, -120px); }
  to { transform: translate(120px, 120px); }
}

/* login box */
.login-box {
  position: relative;
  width: 320px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 25px rgba(0,255,255,0.5);
  text-align: center;
  z-index: 1;
}

.login-box h2 {
  color: #00f7ff;
  margin-bottom: 20px;
  text-shadow: 0 0 10px #00f7ff;
}

/* inputs */
.input-box {
  margin: 15px 0;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

.input-box input::placeholder {
  color: #ccc;
}

/* futuristic button */
button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, #00f7ff, #ff00cc);
  color: white;
  font-weight: bold;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
  box-shadow: 0 0 15px #00f7ff;
}

/* hover */
button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ff00cc, 0 0 40px #00f7ff;
}

/* click */
button:active {
  transform: scale(0.95);
}

/* light animation */
button::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
  transition: 0.5s;
}

button:hover::before {
  left: 100%;
}

/* loading spinner */
.loading {
  pointer-events: none;
  opacity: 0.7;
}

.loading::after {
  content: "";
  width: 18px;
  height: 18px;
  border: 3px solid white;
  border-top: 3px solid transparent;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}

</style>
</head>

<body>

<div class="login-box">
  <h2> Login</h2>

  <form id="loginForm" action="https://watchanimeworld.net/" method="get">
    <div class="input-box">
      <input type="text" id="username" placeholder="Username" required="">
    </div>

    <div class="input-box">
      <input type="email" id="email" placeholder="Email ID" required="">
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Password" required="">
    </div>

    <button id="loginBtn" type="submit">⚡ Login</button>
  
  </form>
</div>

<script>
const form = document.getElementById("loginForm");
const btn = document.getElementById("loginBtn");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  // simple validation
  if (!username || !email || !password) {
    alert("Please fill all fields!");
    return;
  }

  // loading effect
  btn.classList.add("loading");
  btn.innerText = "";

  // simulate login process
  setTimeout(() => {
    btn.classList.remove("loading");
    btn.innerText = "⚡ Login";

    alert("Login successful (Demo only)");

    // reset form
    form.reset();
  }, 2000);
});
</script>


</body></html>
